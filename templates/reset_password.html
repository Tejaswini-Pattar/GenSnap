{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center" style="padding-top:2rem;">
  <div class="col-lg-4 col-md-6 col-sm-10">

    <div class="text-center mb-4">
      <div style="width:52px;height:52px;background:rgba(34,197,94,.12);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;">
        <i class="fa-solid fa-shield-halved" style="color:var(--success);font-size:1.3rem;"></i>
      </div>
      <h2 style="font-weight:800;letter-spacing:-.5px;">Set new password</h2>
      <p style="color:var(--text-secondary);font-size:.9rem;">Choose a strong password for your account.</p>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label for="password" class="form-label">New Password</label>
            <div style="position:relative;">
              <i class="fa-solid fa-lock" style="position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.85rem;"></i>
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="min. 6 characters" required minlength="6"
                     style="padding-left:2.5rem;">
            </div>
          </div>

          <div class="mb-4">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <div style="position:relative;">
              <i class="fa-solid fa-lock" style="position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.85rem;"></i>
              <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                     placeholder="repeat password" required
                     style="padding-left:2.5rem;">
            </div>
          </div>

          <button type="submit" class="btn btn-success w-100">
            <i class="fa-solid fa-floppy-disk me-1"></i> Reset Password
          </button>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
