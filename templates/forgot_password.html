{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="row justify-content-center" style="padding-top:2rem;">
  <div class="col-lg-4 col-md-6 col-sm-10">

    <div class="text-center mb-4">
      <div style="width:52px;height:52px;background:rgba(245,158,11,.12);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;">
        <i class="fa-solid fa-key" style="color:var(--warning);font-size:1.3rem;"></i>
      </div>
      <h2 style="font-weight:800;letter-spacing:-.5px;">Forgot password?</h2>
      <p style="color:var(--text-secondary);font-size:.9rem;max-width:300px;margin:.5rem auto 0;">
        Enter your email and we'll send you a reset link.
      </p>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-4">
            <label for="email" class="form-label">Email Address</label>
            <div style="position:relative;">
              <i class="fa-solid fa-envelope" style="position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.85rem;"></i>
              <input type="email" class="form-control" id="email" name="email"
                     placeholder="you@example.com" required
                     style="padding-left:2.5rem;">
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            <i class="fa-solid fa-paper-plane me-1"></i> Send Reset Link
          </button>
        </form>
      </div>
    </div>

    <p class="text-center mt-4" style="color:var(--text-muted);font-size:.875rem;">
      <a href="{{ url_for('login') }}" style="color:var(--accent);font-weight:600;">
        <i class="fa-solid fa-arrow-left me-1"></i> Back to Login
      </a>
    </p>

  </div>
</div>
{% endblock %}
