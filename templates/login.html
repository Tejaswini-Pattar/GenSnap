{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center" style="padding-top:2rem;">
  <div class="col-lg-4 col-md-6 col-sm-10">

    <div class="text-center mb-4">
      <div style="font-size:2rem;margin-bottom:.5rem;">✦</div>
      <h2 style="font-weight:800;letter-spacing:-.5px;">Welcome back</h2>
      <p style="color:var(--text-secondary);font-size:.9rem;">Sign in to your GenSnap account</p>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="POST" autocomplete="on">
          <div class="mb-4">
            <label for="username" class="form-label">Username</label>
            <div style="position:relative;">
              <i class="fa-solid fa-user" style="position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.85rem;"></i>
              <input type="text" class="form-control" id="username" name="username"
                     placeholder="your_username" required autocomplete="username"
                     style="padding-left:2.5rem;">
            </div>
          </div>

          <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <label for="password" class="form-label mb-0">Password</label>
              <a href="{{ url_for('forgot_password') }}" style="font-size:.78rem;color:var(--text-muted);">Forgot password?</a>
            </div>
            <div style="position:relative;">
              <i class="fa-solid fa-lock" style="position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.85rem;"></i>
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="••••••••" required autocomplete="current-password"
                     style="padding-left:2.5rem;">
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            <i class="fa-solid fa-arrow-right-to-bracket me-1"></i> Sign In
          </button>
        </form>
      </div>
    </div>

    <p class="text-center mt-4" style="color:var(--text-muted);font-size:.875rem;">
      Don't have an account?
      <a href="{{ url_for('register') }}" style="color:var(--accent);font-weight:600;">Create one</a>
    </p>

  </div>
</div>
{% endblock %}
